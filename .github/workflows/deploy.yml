name: CI/CD Pipeline - GCP

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "yarn"
          cache-dependency-path: |
            todo-backend/yarn.lock
            todo-frontend/yarn.lock

      - name: Install backend dependencies
        working-directory: ./todo-backend
        run: yarn install --frozen-lockfile

      - name: Backend typecheck
        working-directory: ./todo-backend
        run: yarn typecheck

      - name: Install frontend dependencies
        working-directory: ./todo-frontend
        run: yarn install --frozen-lockfile

      - name: Frontend typecheck
        working-directory: ./todo-frontend
        run: yarn typecheck

  build-and-deploy:
    name: Build & Deploy to GCP
    runs-on: ubuntu-latest
    needs: test
    environment: production

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: "projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/${{ vars.GCP_WIF_POOL }}/providers/${{ vars.GCP_WIF_PROVIDER }}"
          service_account: "${{ vars.GCP_SERVICE_ACCOUNT_NAME }}@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com"

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ vars.GCP_LOCATION }}-docker.pkg.dev

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build and push image
        run: |
          IMAGE=${{ vars.GCP_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_REPOSITORY }}/${{ vars.GCP_APP_NAME }}

          docker build \
            --platform linux/amd64 \
            -f Dockerfile \
            -t ${IMAGE}:${SHORT_SHA} \
            -t ${IMAGE}:latest \
            .

          docker push ${IMAGE}:${SHORT_SHA}
          docker push ${IMAGE}:latest

      - name: Deploy to Cloud Run
        run: |
          IMAGE=${{ vars.GCP_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_REPOSITORY }}/${{ vars.GCP_APP_NAME }}

          gcloud run deploy ${{ vars.GCP_APP_NAME }} \
            --image=${IMAGE}:${SHORT_SHA} \
            --region=${{ vars.GCP_LOCATION }} \
            --platform=managed \
            --port=3000 \
            --service-account=${{ vars.GCP_SERVICE_ACCOUNT_NAME }}@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --set-secrets=MONGODB_URI=MONGODB_URI:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest \
            --allow-unauthenticated \
            --min-instances=0 \
            --max-instances=3

      - name: Health check
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ vars.GCP_APP_NAME }} \
            --region=${{ vars.GCP_LOCATION }} \
            --format="value(status.url)")

          sleep 10
          curl -f ${SERVICE_URL}/api/health || exit 1

  notify-success:
    name: Notify Success
    runs-on: ubuntu-latest
    needs: build-and-deploy
    if: success()

    steps:
      - name: Send Telegram notification
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d parse_mode=HTML \
            -d text="✅ <b>Todo app deployed to GCP!</b>%0A%0A📦 Repo: ${{ github.repository }}%0A🌿 Branch: ${{ github.ref_name }}%0A👤 By: ${{ github.actor }}%0A🔗 Commit: <code>${{ github.sha }}</code>"

  notify-failure:
    name: Notify Failure
    runs-on: ubuntu-latest
    needs: [test, build-and-deploy]
    if: failure()

    steps:
      - name: Send Telegram notification
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d parse_mode=HTML \
            -d text="❌ <b>Todo app GCP deploy failed!</b>%0A%0A📦 Repo: ${{ github.repository }}%0A🌿 Branch: ${{ github.ref_name }}%0A👤 By: ${{ github.actor }}%0A%0A🔗 <a href='https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'>Xem logs</a>"
